apiVersion: 1

providers:
  - name: 'Helios Dashboards'
    orgId: 1
    folder: 'Helios AI Engine'
    folderUid: 'helios-ai-engine'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
