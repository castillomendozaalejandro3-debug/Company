# Configuración de límites de recursos para workers (systemd compatible)
# Ubicación recomendada: /etc/systemd/system/helios-worker@.service.d/override.conf
# O usar directamente en la unidad de servicio.

[Unit]
Description=Helios AI Worker Instance %i
After=network.target

[Service]
# Límites de Memoria (256MB estrictos)
MemoryMax=256M
MemoryHigh=240M
MemorySwapMax=0

# Límites de CPU (50% de un núcleo)
CPUQuota=50%
CPUWeight=512

# Restricciones adicionales de seguridad y recursos
LimitNOFILE=1024
LimitNPROC=64
ProtectSystem=strict
ProtectHome=true
PrivateTmp=true
NoNewPrivileges=true
ReadWritePaths=/var/lib/helios/workers/%i

[Install]
WantedBy=multi-user.target
